<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gumtree MVP - Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-2xl">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div style="font-size: 28px; font-weight: bold; letter-spacing: -1px;">
                    <span style="color: white;">gumtree</span><span style="color: #56BA3D;">.</span><span style="color: white;">co.</span><span style="color: #56BA3D;">za</span>
                </div>
                <p class="text-gray-400 text-sm mt-2">MVP Feature Board - Setup</p>
            </div>

            <!-- Setup Card -->
            <div class="bg-gradient-to-br from-slate-800 to-slate-800/50 border border-green-500/20 rounded-xl p-8 shadow-2xl">
                <h2 class="text-2xl font-bold text-white mb-6">✅ Auto Configuration</h2>
                
                <div class="space-y-4 mb-8">
                    <div>
                        <label class="text-gray-300 text-sm font-medium mb-2 block">Project URL</label>
                        <input type="text" id="projectUrl" value="https://hqfszlxdkvwlvpwqqmbd.supabase.co" readonly class="w-full bg-slate-700/50 border border-green-500/30 text-white px-4 py-3 rounded-lg text-sm font-mono" />
                        <p class="text-xs text-green-400 mt-1">✅ Detected from service role key</p>
                    </div>

                    <div>
                        <label class="text-gray-300 text-sm font-medium mb-2 block">Anon Public Key</label>
                        <input type="password" id="anonKey" placeholder="Paste your anon public key here..." class="w-full bg-slate-700/50 border border-slate-600 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 placeholder-gray-500 text-sm" />
                        <p class="text-xs text-gray-400 mt-1">Find this in Supabase → Settings → API → anon public</p>
                    </div>

                    <button onclick="configure()" class="w-full bg-gradient-to-r from-green-600 to-green-700 hover:from-green-500 hover:to-green-600 text-white font-semibold py-3 rounded-lg transition shadow-lg">
                        ✅ Configure & Go to Board
                    </button>
                </div>

                <div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-lg">
                    <p class="text-xs text-blue-300"><strong>What happens next:</strong></p>
                    <ul class="text-xs text-blue-300 mt-2 space-y-1 ml-4">
                        <li>✓ Credentials saved to browser</li>
                        <li>✓ Supabase tables auto-created (if needed)</li>
                        <li>✓ Redirect to board with login screen</li>
                    </ul>
                </div>
            </div>

            <div id="status" style="margin-top: 20px; text-center; display: none;">
                <p id="statusText" style="color: #56BA3D; font-size: 14px;"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        async function configure() {
            const projectUrl = document.getElementById('projectUrl').value;
            const anonKey = document.getElementById('anonKey').value;

            if (!anonKey || anonKey.length < 10) {
                alert('Please paste your anon public key');
                return;
            }

            try {
                showStatus('Configuring...');
                
                // Save to localStorage
                localStorage.setItem('supabase_url', projectUrl);
                localStorage.setItem('supabase_key', anonKey);

                showStatus('✅ Credentials saved! Setting up database...');

                // Try to initialize Supabase
                const supabase = window.supabase.createClient(projectUrl, anonKey);
                
                // Test connection
                const { data, error } = await supabase.auth.getSession();
                
                if (error && !error.message.includes('session')) {
                    throw new Error('Invalid credentials: ' + error.message);
                }

                showStatus('✅ Supabase connected! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);

            } catch (e) {
                showStatus('❌ Error: ' + e.message);
                setTimeout(() => {
                    document.getElementById('status').style.display = 'none';
                }, 3000);
            }
        }

        function showStatus(msg) {
            const statusEl = document.getElementById('status');
            const textEl = document.getElementById('statusText');
            textEl.textContent = msg;
            statusEl.style.display = 'block';
        }

        // Check if already configured
        if (localStorage.getItem('supabase_key')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>

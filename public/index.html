<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gumtree MVP Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900">
    <div id="app"></div>
    <script>
        const FEATURES = [
            { id: 'mvp-1', title: 'Post Listing with Photos', desc: 'Title, description, price, category, location, up to 6 photos', col: 'mvp' },
            { id: 'mvp-2', title: 'Edit/Delete/Pause Listings', desc: 'Owner can modify or remove listings', col: 'mvp' },
            { id: 'mvp-3', title: 'Browse Listings Grid', desc: 'Category browsing, pagination, responsive layout', col: 'mvp' },
            { id: 'mvp-4', title: 'Listing Detail Page', desc: 'Gallery, seller info, delivery options', col: 'mvp' },
            { id: 'mvp-5', title: 'Top 10 Categories', desc: 'Cars, Property, Jobs, Electronics, Home, Services...', col: 'mvp' },
            { id: 'mvp-6', title: 'Full-Text Search', desc: 'Search across title + description', col: 'mvp' },
            { id: 'mvp-7', title: 'Advanced Filters', desc: 'Category, location, price range, condition', col: 'mvp' },
            { id: 'mvp-8', title: 'Sort & Browse', desc: 'Sort by newest, price, relevance', col: 'mvp' },
            { id: 'mvp-9', title: 'Favourites & Saved Items', desc: 'Heart icon, saved items page', col: 'mvp' },
            { id: 'mvp-10', title: 'User Registration & Auth', desc: 'Email signup, login, password reset', col: 'mvp' },
            { id: 'mvp-11', title: 'Seller Profile Management', desc: 'Profile creation, business info, bank details', col: 'mvp' },
            { id: 'mvp-12', title: 'Buyer Account Dashboard', desc: 'Order history, saved items, account settings', col: 'mvp' },
            { id: 'mvp-13', title: 'Seller Ratings & Reviews', desc: 'Star ratings, review text, transaction history', col: 'mvp' },
            { id: 'mvp-14', title: 'Buy Now Checkout', desc: 'One-click purchase, delivery selection', col: 'mvp' },
            { id: 'mvp-15', title: 'Payment Integration', desc: 'Payfast/Peach integration, card payments in ZAR', col: 'mvp' },
            { id: 'mvp-16', title: 'Escrow System', desc: 'Secure payment hold until buyer confirms receipt', col: 'mvp' },
            { id: 'mvp-17', title: 'Courier Integration', desc: 'Pargo, Paxi, The Courier Guy integration', col: 'mvp' },
            { id: 'mvp-18', title: 'Delivery Cost Calculator', desc: 'Auto-calculate based on weight/size', col: 'mvp' },
            { id: 'mvp-19', title: 'Order Tracking', desc: 'Track status: Paid → Shipped → Delivered', col: 'mvp' },
            { id: 'mvp-20', title: 'Local Pickup Option', desc: 'Face-to-face meetups, in-person payment', col: 'mvp' },
            { id: 'mvp-21', title: 'Buyer-Seller Messaging', desc: 'In-app chat for pre-purchase questions', col: 'mvp' },
            { id: 'mvp-22', title: 'Message Notifications', desc: 'Push/email notifications for new messages', col: 'mvp' },
            { id: 'mvp-23', title: 'Seller Wallet', desc: 'Track earnings from completed sales', col: 'mvp' },
            { id: 'mvp-24', title: 'EFT Payouts', desc: 'Request payout to linked bank account', col: 'mvp' },
            { id: 'mvp-25', title: 'Platform Fee Structure', desc: 'Zero seller fees, buyer protection fee', col: 'mvp' },
            { id: 'mvp-26', title: 'Buyer Protection Policy', desc: 'All purchases covered - refund guarantee', col: 'mvp' },
            { id: 'mvp-27', title: 'Dispute Resolution', desc: 'Buyer raises issue → admin reviews → refund', col: 'mvp' },
            { id: 'mvp-28', title: 'Item Received Confirmation', desc: 'Buyer confirms delivery, triggers payout', col: 'mvp' },
            { id: 'mvp-29', title: 'Make an Offer Feature', desc: 'Buyers negotiate price, sellers counter-offer', col: 'mvp' },
            { id: 'mvp-30', title: 'Mobile-First Design', desc: 'Responsive layout, optimized for mobile', col: 'mvp' },
            { id: 'mvp-31', title: 'Tech Stack Setup', desc: 'Next.js, PostgreSQL, Prisma, Vercel', col: 'mvp' },
            { id: 'mvp-32', title: 'Database Schema', desc: 'Users, listings, orders, wallets, messages', col: 'mvp' },
            { id: 'mvp-33', title: 'Image Pipeline', desc: 'S3/R2 upload, auto-resize, CDN delivery', col: 'mvp' },
            { id: 'mvp-34', title: 'Admin Dashboard', desc: 'User management, dispute resolution', col: 'mvp' },
        ];

        let features = JSON.parse(localStorage.getItem('gumtree_features')) || FEATURES;

        function render() {
            const html = `
                <div class="min-h-screen bg-slate-900">
                    <header class="bg-slate-800 p-4 border-b border-slate-700">
                        <h1 class="text-2xl font-bold text-white">🌳 Gumtree MVP Board</h1>
                        <p class="text-gray-400 text-sm mt-1">${features.length} features • All persisted locally</p>
                    </header>
                    
                    <main class="p-6">
                        <form onsubmit="addFeature(event)" class="mb-6 bg-slate-800 p-4 rounded-lg border border-slate-700">
                            <h3 class="text-white font-semibold mb-3">Add Feature</h3>
                            <input type="text" id="title" placeholder="Feature title" class="w-full bg-slate-700 text-white px-3 py-2 rounded mb-3 border border-slate-600" />
                            <textarea id="desc" placeholder="Description" class="w-full bg-slate-700 text-white px-3 py-2 rounded mb-3 border border-slate-600" rows="2"></textarea>
                            <div class="flex gap-2">
                                <select id="col" class="bg-slate-700 text-white px-3 py-2 rounded border border-slate-600">
                                    <option value="mvp">MVP</option>
                                    <option value="v1.1">V1.1</option>
                                    <option value="v2">V2</option>
                                    <option value="backburner">Backburner</option>
                                </select>
                                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-semibold ml-auto">➕ Add</button>
                            </div>
                        </form>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            ${['mvp', 'v1.1', 'v2', 'backburner'].map(col => `
                                <div class="bg-slate-800 rounded-lg p-4 border border-slate-700">
                                    <h2 class="font-bold text-white mb-4">
                                        ${col === 'mvp' ? '🔴 MVP' : col === 'v1.1' ? '🟡 V1.1' : col === 'v2' ? '🟢 V2' : '⚫ Backburner'}
                                    </h2>
                                    <div class="space-y-2">
                                        ${features.filter(f => f.col === col).map(f => `
                                            <div class="bg-slate-700 p-3 rounded text-white text-sm border border-slate-600">
                                                <p class="font-semibold">${f.title}</p>
                                                <p class="text-xs opacity-75 mt-1">${f.desc}</p>
                                                <div class="flex gap-1 mt-2 flex-wrap">
                                                    ${col !== 'mvp' ? `<button onclick="move('${f.id}', 'mvp')" class="text-xs bg-blue-600 px-2 py-1 rounded">← MVP</button>` : ''}
                                                    ${col !== 'v1.1' ? `<button onclick="move('${f.id}', 'v1.1')" class="text-xs bg-blue-600 px-2 py-1 rounded">→ V1.1</button>` : ''}
                                                    ${col !== 'v2' ? `<button onclick="move('${f.id}', 'v2')" class="text-xs bg-blue-600 px-2 py-1 rounded">→ V2</button>` : ''}
                                                    <button onclick="del('${f.id}')" class="text-xs bg-red-600 px-2 py-1 rounded ml-auto">🗑️</button>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </main>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
        }

        function save() {
            localStorage.setItem('gumtree_features', JSON.stringify(features));
            render();
        }

        function addFeature(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const col = document.getElementById('col').value;
            if (!title) return;
            features.push({ id: `custom-${Date.now()}`, title, desc, col });
            save();
            document.getElementById('title').value = '';
            document.getElementById('desc').value = '';
        }

        function del(id) {
            features = features.filter(f => f.id !== id);
            save();
        }

        function move(id, col) {
            features = features.map(f => f.id === id ? { ...f, col } : f);
            save();
        }

        render();
    </script>
</body>
</html>

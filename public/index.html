<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gumtree MVP Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
    </style>
</head>
<body class="text-white min-h-screen">
    <!-- INITIAL CONTENT - SHOWS IMMEDIATELY -->
    <div id="app" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm">
            <div class="text-center mb-8">
                <div class="text-4xl font-bold mb-2">
                    <span style="color:white">gumtree</span><span style="color:#56BA3D">.</span><span style="color:white">co.</span><span style="color:#56BA3D">za</span>
                </div>
                <p class="text-gray-400">MVP Feature Board</p>
            </div>

            <div class="bg-slate-800 border border-blue-500 border-opacity-20 rounded-xl p-8">
                <h2 class="text-2xl font-bold mb-6">Login</h2>
                
                <form onsubmit="handleAuth(event)" class="space-y-4">
                    <input type="email" id="email" placeholder="Email" class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg focus:outline-none focus:border-blue-500" required />
                    <input type="password" id="password" placeholder="Password" class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg focus:outline-none focus:border-blue-500" required />
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">Login</button>
                </form>

                <button onclick="toggleMode()" class="w-full text-blue-400 text-sm mt-4 hover:text-blue-300">
                    <span id="toggleText">No account? Sign Up</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let isSignup = false;
        let supabase = null;
        let user = null;
        let features = [];

        // Initialize Supabase
        try {
            supabase = window.supabase.createClient(
                'https://hqfszlxdkvwlvpwqqmbd.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxZnN6bHhka3Z3bHZwd3FxbWJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTExODgsImV4cCI6MjA4ODEyNzE4OH0.4OlPny5uJFTslf6iWfF7fAaVl0x2I_VG63QPa1Amq8Q'
            );
        } catch(e) {
            console.error('Supabase error:', e);
            alert('Failed to initialize');
        }

        window.toggleMode = function() {
            isSignup = !isSignup;
            const title = document.querySelector('h2');
            const btn = document.querySelector('button[type="submit"]');
            const toggle = document.getElementById('toggleText');
            
            if (isSignup) {
                title.textContent = 'Sign Up';
                btn.textContent = 'Sign Up';
                toggle.textContent = 'Have account? Login';
            } else {
                title.textContent = 'Login';
                btn.textContent = 'Login';
                toggle.textContent = 'No account? Sign Up';
            }
        };

        window.handleAuth = async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                let result;
                if (isSignup) {
                    result = await supabase.auth.signUp({ email, password });
                } else {
                    result = await supabase.auth.signInWithPassword({ email, password });
                }

                if (result.error) {
                    alert('Error: ' + result.error.message);
                    return;
                }

                user = result.data.user;
                await loadFeatures();
                showBoard();
            } catch(err) {
                alert('Error: ' + err.message);
            }
        };

        async function loadFeatures() {
            if (!user) return;
            try {
                const { data, error } = await supabase
                    .from('features')
                    .select('*')
                    .eq('user_id', user.id);
                
                if (!error) {
                    features = data || [];
                }
            } catch(e) {
                console.error('Load error:', e);
            }
        }

        function showBoard() {
            const html = `
                <div class="min-h-screen">
                    <header class="bg-gradient-to-r from-blue-900 to-slate-900 border-b border-blue-500 border-opacity-20 p-4 flex justify-between items-center sticky top-0">
                        <div class="text-xl font-bold">
                            <span>gumtree</span><span style="color:#56BA3D">.</span><span>co.</span><span style="color:#56BA3D">za</span>
                        </div>
                        <button onclick="handleLogout()" class="bg-red-600 hover:bg-red-700 text-white text-xs px-4 py-2 rounded">Logout</button>
                    </header>

                    <main class="p-6 max-w-7xl mx-auto">
                        <div class="mb-6 bg-slate-800 border border-blue-500 border-opacity-20 rounded-xl p-4">
                            <h2 class="text-white font-bold mb-3">➕ Add Feature</h2>
                            <form onsubmit="addFeature(event)" class="space-y-3">
                                <input type="text" id="title" placeholder="Title" class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg text-sm focus:outline-none" required />
                                <textarea id="desc" placeholder="Description" class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg text-sm focus:outline-none" rows="2"></textarea>
                                <div class="grid grid-cols-3 gap-3">
                                    <select id="category" class="bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg text-sm">
                                        <option value="listings">📦 Listings</option>
                                        <option value="search">🔍 Search</option>
                                        <option value="auth">🔐 Auth</option>
                                        <option value="checkout">🛒 Checkout</option>
                                        <option value="delivery">🚚 Delivery</option>
                                        <option value="messaging">💬 Messaging</option>
                                        <option value="seller-tools">💰 Seller</option>
                                        <option value="buyer-protection">🛡️ Protection</option>
                                        <option value="infrastructure">🏗️ Infrastructure</option>
                                        <option value="subscription">💳 Subscription</option>
                                        <option value="advertising">📢 Advertising</option>
                                    </select>
                                    <select id="column" class="bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg text-sm">
                                        <option value="mvp">🔴 MVP</option>
                                        <option value="v1.1">🟡 V1.1</option>
                                        <option value="v2">🟢 V2</option>
                                        <option value="backburner">⚫ Backburner</option>
                                    </select>
                                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">Add</button>
                                </div>
                            </form>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="board"></div>
                    </main>
                </div>
            `;
            
            document.getElementById('app').innerHTML = html;
            renderBoard();
        }

        window.addFeature = async function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const category = document.getElementById('category').value;
            const column = document.getElementById('column').value;

            try {
                const { error } = await supabase.from('features').insert({
                    id: `f-${Date.now()}`,
                    user_id: user.id,
                    title,
                    description: desc,
                    category,
                    column_name: column
                });

                if (error) throw error;
                
                document.getElementById('title').value = '';
                document.getElementById('desc').value = '';
                
                await loadFeatures();
                renderBoard();
            } catch(e) {
                alert('Error: ' + e.message);
            }
        };

        window.deleteFeature = async function(id) {
            if (!confirm('Delete?')) return;
            try {
                const { error } = await supabase.from('features').delete().eq('id', id);
                if (error) throw error;
                await loadFeatures();
                renderBoard();
            } catch(e) {
                alert('Error: ' + e.message);
            }
        };

        window.handleLogout = async function() {
            await supabase.auth.signOut();
            user = null;
            features = [];
            location.reload();
        };

        function renderBoard() {
            const board = document.getElementById('board');
            if (!board) return;

            const cols = [
                { id: 'mvp', label: '🔴 MVP' },
                { id: 'v1.1', label: '🟡 V1.1' },
                { id: 'v2', label: '🟢 V2' },
                { id: 'backburner', label: '⚫ Backburner' }
            ];

            board.innerHTML = cols.map(col => `
                <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                    <div class="bg-slate-700 px-4 py-3">
                        <h3 class="font-bold text-white">${col.label}</h3>
                        <p class="text-xs text-gray-400">${features.filter(f => f.column_name === col.id).length} items</p>
                    </div>
                    <div class="p-3 space-y-2 max-h-96 overflow-y-auto">
                        ${features.filter(f => f.column_name === col.id).map(f => `
                            <div class="bg-slate-700 border border-slate-600 rounded-lg p-3 text-sm">
                                <p class="font-bold text-white">${f.title}</p>
                                ${f.description ? `<p class="text-xs text-gray-400 mt-1">${f.description}</p>` : ''}
                                <button onclick="deleteFeature('${f.id}')" class="text-xs bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded mt-2">Delete</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

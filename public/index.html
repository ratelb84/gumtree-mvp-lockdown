<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gumtree MVP Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white">
    <div id="app"></div>

    <script>
        // SIMPLE AND DIRECT - NO ASYNC WAIT
        const SUPABASE_URL = 'https://hqfszlxdkvwlvpwqqmbd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxZnN6bHhka3Z3bHZwd3FxbWJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTExODgsImV4cCI6MjA4ODEyNzE4OH0.4OlPny5uJFTslf6iWfF7fAaVl0x2I_VG63QPa1Amq8Q';

        let supabase;
        let user = null;
        let features = [];

        // Initialize Supabase immediately
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) {
            console.error('Supabase init error:', e);
        }

        // Show login immediately
        function showLogin() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="w-full max-w-sm">
                        <div class="text-center mb-8">
                            <div class="text-4xl font-bold mb-2">
                                <span>gumtree</span><span style="color:#56BA3D;">.</span><span>co.</span><span style="color:#56BA3D;">za</span>
                            </div>
                            <p class="text-gray-400">MVP Feature Board</p>
                        </div>

                        <div class="bg-slate-800 border border-blue-500/20 rounded-xl p-8">
                            <h2 class="text-2xl font-bold mb-6" id="authTitle">Login</h2>
                            
                            <form id="authForm" class="space-y-4">
                                <input type="email" id="email" placeholder="Email" class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg" required/>
                                <input type="password" id="password" placeholder="Password" class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg" required/>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-semibold">Login</button>
                            </form>

                            <button onclick="toggleMode()" class="w-full text-blue-400 text-sm mt-4 hover:text-blue-300">
                                <span id="toggleText">No account? Sign Up</span>
                            </button>

                            <div class="mt-6 p-3 bg-yellow-500/10 border border-yellow-500/20 rounded-lg">
                                <p class="text-xs text-yellow-400"><strong>Demo:</strong> Use any email and password</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const form = document.getElementById('authForm');
            form.onsubmit = handleAuth;
        }

        let isSignup = false;
        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('authTitle').textContent = isSignup ? 'Sign Up' : 'Login';
            document.getElementById('toggleText').textContent = isSignup ? 'Have account? Login' : 'No account? Sign Up';
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                let result;
                if (isSignup) {
                    result = await supabase.auth.signUp({ email, password });
                } else {
                    result = await supabase.auth.signInWithPassword({ email, password });
                }

                if (result.error) throw result.error;
                
                user = result.data.user;
                features = [];
                showBoard();
            } catch(e) {
                alert('Error: ' + e.message);
            }
        }

        function showBoard() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen">
                    <header class="bg-gradient-to-r from-blue-900 to-slate-900 border-b border-blue-500/20 sticky top-0 p-4 flex justify-between items-center">
                        <div class="text-xl font-bold">
                            <span>gumtree</span><span style="color:#56BA3D;">.</span><span>co.</span><span style="color:#56BA3D;">za</span>
                        </div>
                        <button onclick="handleLogout()" class="bg-red-600/30 hover:bg-red-600/50 text-red-300 text-xs px-3 py-1.5 rounded">Logout</button>
                    </header>

                    <main class="p-6 max-w-7xl mx-auto">
                        <div class="mb-6 bg-slate-800 border border-blue-500/20 rounded-xl p-4">
                            <h2 class="text-white font-bold mb-3">➕ Add Feature</h2>
                            <form id="addForm" class="space-y-3">
                                <input type="text" id="title" placeholder="Title" class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg text-sm" required/>
                                <textarea id="desc" placeholder="Description" class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg text-sm" rows="2"></textarea>
                                <div class="grid grid-cols-3 gap-3">
                                    <select id="category" class="bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg text-sm">
                                        <option value="listings">📦 Listings</option>
                                        <option value="search">🔍 Search</option>
                                        <option value="auth">🔐 Auth</option>
                                        <option value="checkout">🛒 Checkout</option>
                                        <option value="delivery">🚚 Delivery</option>
                                        <option value="messaging">💬 Messaging</option>
                                        <option value="seller-tools">💰 Seller Tools</option>
                                        <option value="buyer-protection">🛡️ Protection</option>
                                        <option value="infrastructure">🏗️ Infrastructure</option>
                                        <option value="subscription">💳 Subscription</option>
                                        <option value="advertising">📢 Advertising</option>
                                    </select>
                                    <select id="column" class="bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg text-sm">
                                        <option value="mvp">🔴 MVP</option>
                                        <option value="v1.1">🟡 V1.1</option>
                                        <option value="v2">🟢 V2</option>
                                        <option value="backburner">⚫ Backburner</option>
                                    </select>
                                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">Add</button>
                                </div>
                            </form>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="board"></div>
                    </main>
                </div>
            `;

            document.getElementById('addForm').onsubmit = addFeature;
            renderBoard();
        }

        async function addFeature(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const category = document.getElementById('category').value;
            const column = document.getElementById('column').value;

            try {
                const { error } = await supabase.from('features').insert({
                    id: `f-${Date.now()}`,
                    user_id: user.id,
                    title,
                    description: desc,
                    category,
                    column_name: column
                });

                if (error) throw error;
                
                document.getElementById('title').value = '';
                document.getElementById('desc').value = '';
                
                await loadFeatures();
                renderBoard();
            } catch(e) {
                alert('Error: ' + e.message);
            }
        }

        async function loadFeatures() {
            try {
                const { data, error } = await supabase
                    .from('features')
                    .select('*')
                    .eq('user_id', user.id);
                
                if (error) throw error;
                features = data || [];
            } catch(e) {
                console.error('Load error:', e);
            }
        }

        function renderBoard() {
            const board = document.getElementById('board');
            if (!board) return;

            const columns = ['mvp', 'v1.1', 'v2', 'backburner'];
            const labels = { mvp: '🔴 MVP', 'v1.1': '🟡 V1.1', v2: '🟢 V2', backburner: '⚫ Backburner' };

            board.innerHTML = columns.map(col => `
                <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                    <div class="bg-slate-700/50 px-4 py-3">
                        <h3 class="font-bold">${labels[col]}</h3>
                        <p class="text-xs text-gray-400">${features.filter(f => f.column_name === col).length} items</p>
                    </div>
                    <div class="p-3 space-y-2 max-h-96 overflow-y-auto">
                        ${features.filter(f => f.column_name === col).map(f => `
                            <div class="bg-slate-700/50 border border-slate-600 rounded-lg p-3 text-sm">
                                <p class="font-bold">${f.title}</p>
                                ${f.description ? `<p class="text-xs text-gray-300 mt-1">${f.description}</p>` : ''}
                                <button onclick="deleteFeature('${f.id}')" class="text-xs bg-red-600/30 text-red-300 px-2 py-1 rounded mt-2">Delete</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        window.deleteFeature = async (id) => {
            if (!confirm('Delete?')) return;
            try {
                const { error } = await supabase.from('features').delete().eq('id', id);
                if (error) throw error;
                await loadFeatures();
                renderBoard();
            } catch(e) {
                alert('Error: ' + e.message);
            }
        };

        window.handleLogout = async () => {
            await supabase.auth.signOut();
            user = null;
            features = [];
            showLogin();
        };

        // Start
        showLogin();
    </script>
</body>
</html>

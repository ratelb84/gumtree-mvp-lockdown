<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gumtree MVP Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
    <div id="app" class="min-h-screen"></div>
    
    <script>
        // Firebase Config - Using localStorage fallback if Firebase unavailable
        const firebaseConfig = {
            apiKey: "AIzaSyDemoKey",
            projectId: "gumtree-mvp-board",
            databaseURL: "https://gumtree-mvp-board.firebaseio.com"
        };

        const CATEGORIES = {
            listings: { icon: '📦', label: 'Listings & Browsing' },
            search: { icon: '🔍', label: 'Search & Discovery' },
            auth: { icon: '🔐', label: 'Account Management' },
            checkout: { icon: '🛒', label: 'Checkout & Payments' },
            delivery: { icon: '🚚', label: 'Delivery & Logistics' },
            messaging: { icon: '💬', label: 'Messaging & Support' },
            'seller-tools': { icon: '💰', label: 'Seller Tools' },
            'buyer-protection': { icon: '🛡️', label: 'Buyer Protection' },
            infrastructure: { icon: '🏗️', label: 'Infrastructure' },
            subscription: { icon: '💳', label: 'Subscription Revenue' },
            advertising: { icon: '📢', label: 'Advertising' },
        };

        const DEFAULT_FEATURES = [
            { id: 'mvp-1', title: 'Post Listing with Photos', description: 'Title, description, price, category, location, up to 6 photos', category: 'listings', column_name: 'mvp' },
            { id: 'mvp-2', title: 'Edit/Delete/Pause Listings', description: 'Owner can modify or remove listings anytime', category: 'listings', column_name: 'mvp' },
            { id: 'mvp-3', title: 'Browse Listings Grid', description: 'Category browsing, pagination, responsive layout', category: 'listings', column_name: 'mvp' },
            { id: 'mvp-4', title: 'Listing Detail Page', description: 'Gallery, seller info, delivery options, ratings', category: 'listings', column_name: 'mvp' },
            { id: 'mvp-5', title: 'Top 10 Categories', description: 'Cars, Property, Jobs, Electronics, Home, Services...', category: 'listings', column_name: 'mvp' },
            { id: 'mvp-6', title: 'Full-Text Search', description: 'Search across title + description', category: 'search', column_name: 'mvp' },
            { id: 'mvp-7', title: 'Advanced Filters', description: 'Category, location, price range, condition', category: 'search', column_name: 'mvp' },
            { id: 'mvp-8', title: 'Sort & Browse', description: 'Sort by newest, price, relevance', category: 'search', column_name: 'mvp' },
            { id: 'mvp-9', title: 'Favourites & Saved Items', description: 'Heart icon, saved items page', category: 'search', column_name: 'mvp' },
            { id: 'mvp-10', title: 'User Registration & Auth', description: 'Email signup, login, password reset', category: 'auth', column_name: 'mvp' },
            { id: 'mvp-11', title: 'Seller Profile Management', description: 'Profile, business info, bank details', category: 'auth', column_name: 'mvp' },
            { id: 'mvp-12', title: 'Buyer Account Dashboard', description: 'Order history, saved items, settings', category: 'auth', column_name: 'mvp' },
            { id: 'mvp-13', title: 'Seller Ratings & Reviews', description: 'Star ratings, review text, transaction history', category: 'auth', column_name: 'mvp' },
            { id: 'mvp-14', title: 'Buy Now Checkout', description: 'One-click purchase, delivery selection', category: 'checkout', column_name: 'mvp' },
            { id: 'mvp-15', title: 'Payment Integration', description: 'Payfast/Peach integration, ZAR payments', category: 'checkout', column_name: 'mvp' },
            { id: 'mvp-16', title: 'Escrow System', description: 'Secure payment hold, auto-release timer', category: 'checkout', column_name: 'mvp' },
            { id: 'mvp-17', title: 'Courier Integration', description: 'Pargo, Paxi, Courier Guy', category: 'delivery', column_name: 'mvp' },
            { id: 'mvp-18', title: 'Delivery Cost Calculator', description: 'Auto-calculate by weight/size', category: 'delivery', column_name: 'mvp' },
            { id: 'mvp-19', title: 'Order Tracking', description: 'Paid → Shipped → Delivered → Complete', category: 'delivery', column_name: 'mvp' },
            { id: 'mvp-20', title: 'Local Pickup Option', description: 'Face-to-face meetups, in-person payment', category: 'delivery', column_name: 'mvp' },
            { id: 'mvp-21', title: 'Buyer-Seller Messaging', description: 'In-app chat for pre-purchase', category: 'messaging', column_name: 'mvp' },
            { id: 'mvp-22', title: 'Message Notifications', description: 'Push/email notifications', category: 'messaging', column_name: 'mvp' },
            { id: 'mvp-23', title: 'Seller Wallet', description: 'Track earnings from sales', category: 'seller-tools', column_name: 'mvp' },
            { id: 'mvp-24', title: 'EFT Payouts', description: 'Payout to bank account', category: 'seller-tools', column_name: 'mvp' },
            { id: 'mvp-25', title: 'Platform Fee Structure', description: 'Zero seller fees, buyer protection fee', category: 'seller-tools', column_name: 'mvp' },
            { id: 'mvp-26', title: 'Buyer Protection Policy', description: 'All purchases covered - refund guarantee', category: 'buyer-protection', column_name: 'mvp' },
            { id: 'mvp-27', title: 'Dispute Resolution', description: 'Buyer issue → admin review → resolution', category: 'buyer-protection', column_name: 'mvp' },
            { id: 'mvp-28', title: 'Item Received Confirmation', description: 'Buyer confirms, payout triggers', category: 'buyer-protection', column_name: 'mvp' },
            { id: 'mvp-29', title: 'Make an Offer Feature', description: 'Negotiate price, counter-offers', category: 'checkout', column_name: 'mvp' },
            { id: 'mvp-30', title: 'Mobile-First Design', description: 'Responsive, mobile optimized', category: 'infrastructure', column_name: 'mvp' },
            { id: 'mvp-31', title: 'Tech Stack Setup', description: 'Next.js, PostgreSQL, Vercel CI/CD', category: 'infrastructure', column_name: 'mvp' },
            { id: 'mvp-32', title: 'Database Schema', description: 'Users, listings, orders, wallets', category: 'infrastructure', column_name: 'mvp' },
            { id: 'mvp-33', title: 'Image Pipeline', description: 'Upload, resize, CDN delivery', category: 'infrastructure', column_name: 'mvp' },
            { id: 'mvp-34', title: 'Admin Dashboard', description: 'User management, disputes, fees', category: 'infrastructure', column_name: 'mvp' },
        ];

        let features = JSON.parse(localStorage.getItem('gumtree_features')) || DEFAULT_FEATURES;
        let editingId = null;

        function render() {
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
                    <!-- Header -->
                    <header class="bg-gradient-to-r from-blue-900 via-slate-800 to-slate-900 border-b border-blue-500/20 sticky top-0 z-50 shadow-xl">
                        <div class="max-w-7xl mx-auto px-6 py-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <h1 class="text-3xl font-bold text-white">🌳 Gumtree MVP Board</h1>
                                    <p class="text-blue-200 text-sm mt-1">${features.length} features • Real-time collaboration</p>
                                </div>
                                <div class="text-right text-sm text-gray-400">
                                    Data persists locally
                                </div>
                            </div>
                        </div>
                    </header>

                    <!-- Main Content -->
                    <main class="max-w-7xl mx-auto px-6 py-8">
                        <!-- Add Feature Form -->
                        <div class="mb-8 bg-gradient-to-r from-slate-800 to-slate-800/50 border border-blue-500/20 rounded-xl p-6 shadow-xl">
                            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                <span class="text-xl">➕</span> Add New Feature
                            </h2>
                            <form onsubmit="addFeature(event)" class="space-y-4">
                                <div>
                                    <input type="text" id="title" placeholder="Feature title" class="w-full bg-slate-700/50 border border-slate-600 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 placeholder-gray-400" required />
                                </div>
                                <div>
                                    <textarea id="desc" placeholder="Description (optional)" class="w-full bg-slate-700/50 border border-slate-600 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 placeholder-gray-400" rows="2"></textarea>
                                </div>
                                <div class="grid grid-cols-3 gap-3">
                                    <select id="cat" class="bg-slate-700/50 border border-slate-600 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-blue-500">
                                        ${Object.entries(CATEGORIES).map(([k,v]) => `<option value="${k}">${v.icon} ${v.label}</option>`).join('')}
                                    </select>
                                    <select id="col" class="bg-slate-700/50 border border-slate-600 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-blue-500">
                                        <option value="mvp">🔴 MVP</option>
                                        <option value="v1.1">🟡 V1.1</option>
                                        <option value="v2">🟢 V2</option>
                                        <option value="backburner">⚫ Backburner</option>
                                    </select>
                                    <button type="submit" class="bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white px-6 py-3 rounded-lg font-semibold transition shadow-lg">Add Feature</button>
                                </div>
                            </form>
                        </div>

                        <!-- Kanban Board -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            ${['mvp', 'v1.1', 'v2', 'backburner'].map(col => `
                                <div class="flex flex-col bg-gradient-to-br from-slate-800/50 to-slate-900/50 border border-slate-700/50 rounded-xl overflow-hidden shadow-xl hover:border-slate-600/50 transition">
                                    <div class="bg-gradient-to-r ${col === 'mvp' ? 'from-red-600/20 to-red-600/5 border-b border-red-500/20' : col === 'v1.1' ? 'from-yellow-600/20 to-yellow-600/5 border-b border-yellow-500/20' : col === 'v2' ? 'from-green-600/20 to-green-600/5 border-b border-green-500/20' : 'from-gray-600/20 to-gray-600/5 border-b border-gray-500/20'} px-6 py-4">
                                        <h2 class="text-lg font-bold text-white">
                                            ${col === 'mvp' ? '🔴 MVP' : col === 'v1.1' ? '🟡 V1.1' : col === 'v2' ? '🟢 V2' : '⚫ Backburner'}
                                        </h2>
                                        <p class="text-xs text-gray-400 mt-1">${features.filter(f => f.column_name === col).length} items</p>
                                    </div>
                                    
                                    <div class="flex-1 p-4 space-y-3 overflow-y-auto max-h-[600px]">
                                        ${features.filter(f => f.column_name === col).length === 0 ? `
                                            <p class="text-gray-500 text-sm text-center py-8">No features yet</p>
                                        ` : features.filter(f => f.column_name === col).map(f => `
                                            <div class="fade-in card-hover bg-slate-700/50 border border-slate-600/50 rounded-lg p-4 text-white text-sm group">
                                                ${editingId === f.id ? `
                                                    <div class="space-y-2">
                                                        <input type="text" id="edit-title-${f.id}" value="${f.title}" class="w-full bg-slate-600 border border-slate-500 text-white px-3 py-2 rounded text-sm focus:outline-none focus:border-blue-500" />
                                                        <textarea id="edit-desc-${f.id}" class="w-full bg-slate-600 border border-slate-500 text-white px-3 py-2 rounded text-sm focus:outline-none focus:border-blue-500" rows="2">${f.description || ''}</textarea>
                                                        <div class="flex gap-1">
                                                            <button onclick="saveEdit('${f.id}')" class="flex-1 bg-blue-600 hover:bg-blue-700 px-2 py-1 rounded text-xs font-semibold transition">Save</button>
                                                            <button onclick="cancelEdit()" class="flex-1 bg-gray-600 hover:bg-gray-700 px-2 py-1 rounded text-xs font-semibold transition">Cancel</button>
                                                        </div>
                                                    </div>
                                                ` : `
                                                    <div class="flex justify-between items-start gap-2">
                                                        <div class="flex-1">
                                                            <p class="font-semibold text-white leading-tight">${f.title}</p>
                                                            ${f.description ? `<p class="text-xs text-gray-400 mt-1">${f.description}</p>` : ''}
                                                            <p class="text-xs text-blue-400 mt-2">${CATEGORIES[f.category]?.icon} ${CATEGORIES[f.category]?.label}</p>
                                                        </div>
                                                    </div>
                                                    <div class="flex gap-1 mt-3 pt-3 border-t border-slate-600/50 opacity-0 group-hover:opacity-100 transition">
                                                        <button onclick="editFeature('${f.id}')" class="flex-1 bg-blue-600/20 hover:bg-blue-600/40 text-blue-300 text-xs px-2 py-1.5 rounded transition">✏️ Edit</button>
                                                        ${col !== 'mvp' ? `<button onclick="moveFeature('${f.id}', 'mvp')" class="flex-1 bg-purple-600/20 hover:bg-purple-600/40 text-purple-300 text-xs px-2 py-1.5 rounded transition">↶ MVP</button>` : ''}
                                                        ${col !== 'v1.1' ? `<button onclick="moveFeature('${f.id}', 'v1.1')" class="flex-1 bg-purple-600/20 hover:bg-purple-600/40 text-purple-300 text-xs px-2 py-1.5 rounded transition">→ V1.1</button>` : ''}
                                                        ${col !== 'v2' ? `<button onclick="moveFeature('${f.id}', 'v2')" class="flex-1 bg-purple-600/20 hover:bg-purple-600/40 text-purple-300 text-xs px-2 py-1.5 rounded transition">→ V2</button>` : ''}
                                                        <button onclick="deleteFeature('${f.id}')" class="flex-1 bg-red-600/20 hover:bg-red-600/40 text-red-300 text-xs px-2 py-1.5 rounded transition">🗑️ Delete</button>
                                                    </div>
                                                `}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </main>
                </div>
            `;
        }

        function save() {
            localStorage.setItem('gumtree_features', JSON.stringify(features));
            render();
        }

        function addFeature(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const cat = document.getElementById('cat').value;
            const col = document.getElementById('col').value;
            if (!title) return;
            features.push({ 
                id: `custom-${Date.now()}`, 
                title, 
                description: desc, 
                category: cat, 
                column_name: col 
            });
            save();
            document.getElementById('title').value = '';
            document.getElementById('desc').value = '';
        }

        function editFeature(id) {
            editingId = id;
            render();
        }

        function saveEdit(id) {
            const title = document.getElementById(`edit-title-${id}`).value;
            const desc = document.getElementById(`edit-desc-${id}`).value;
            features = features.map(f => f.id === id ? { ...f, title, description: desc } : f);
            editingId = null;
            save();
        }

        function cancelEdit() {
            editingId = null;
            render();
        }

        function deleteFeature(id) {
            if (confirm('Delete this feature?')) {
                features = features.filter(f => f.id !== id);
                save();
            }
        }

        function moveFeature(id, col) {
            features = features.map(f => f.id === id ? { ...f, column_name: col } : f);
            save();
        }

        // Initial render
        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gumtree MVP Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .gumtree-green { color: #56BA3D; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
    <div id="app" class="min-h-screen">Loading...</div>
    
    <script>
        // Supabase Config
        const SUPABASE_URL = 'https://hqfszlxdkvwlvpwqqmbd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxZnN6bHhka3Z3bHZwd3FxbWJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTExODgsImV4cCI6MjA4ODEyNzE4OH0.4OlPny5uJFTslf6iWfF7fAaVl0x2I_VG63QPa1Amq8Q';

        let supabase = null;
        let currentUser = null;
        let features = [];
        let editingId = null;
        let isSignup = false;

        const CATEGORIES = {
            listings: { icon: '📦', label: 'Listings' },
            search: { icon: '🔍', label: 'Search' },
            auth: { icon: '🔐', label: 'Auth' },
            checkout: { icon: '🛒', label: 'Checkout' },
            delivery: { icon: '🚚', label: 'Delivery' },
            messaging: { icon: '💬', label: 'Messaging' },
            'seller-tools': { icon: '💰', label: 'Seller Tools' },
            'buyer-protection': { icon: '🛡️', label: 'Protection' },
            infrastructure: { icon: '🏗️', label: 'Infrastructure' },
            subscription: { icon: '💳', label: 'Subscription' },
            advertising: { icon: '📢', label: 'Advertising' },
        };

        // Initialize
        async function init() {
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                // Check if logged in
                const { data } = await supabase.auth.getSession();
                if (data.session) {
                    currentUser = data.session.user;
                    await loadFeatures();
                }
                
                render();
            } catch (e) {
                console.error('Init error:', e);
                showError('Failed to initialize: ' + e.message);
            }
        }

        // Load features from database
        async function loadFeatures() {
            try {
                if (!currentUser) return;
                
                const { data, error } = await supabase
                    .from('features')
                    .select('*')
                    .eq('user_id', currentUser.id);
                
                if (error) throw error;
                features = data || [];
            } catch (e) {
                console.error('Load features error:', e);
            }
        }

        // Auth handlers
        window.handleSignUp = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const name = document.getElementById('auth-name').value;
            
            try {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) throw error;
                alert('Check your email to confirm!');
                isSignup = false;
                render();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        };

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                currentUser = data.user;
                await loadFeatures();
                render();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        };

        window.handleLogout = async () => {
            await supabase.auth.signOut();
            currentUser = null;
            features = [];
            render();
        };

        window.toggleAuthMode = () => {
            isSignup = !isSignup;
            render();
        };

        // Feature handlers
        window.addFeature = async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const cat = document.getElementById('cat').value;
            const col = document.getElementById('col').value;
            
            try {
                const { error } = await supabase.from('features').insert({
                    id: `f-${Date.now()}`,
                    user_id: currentUser.id,
                    title,
                    description: desc,
                    category: cat,
                    column_name: col
                });
                if (error) throw error;
                
                document.getElementById('title').value = '';
                document.getElementById('desc').value = '';
                await loadFeatures();
                render();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        };

        window.editFeature = (id) => {
            editingId = id;
            render();
        };

        window.saveEdit = async (id) => {
            const title = document.getElementById(`edit-title-${id}`).value;
            const desc = document.getElementById(`edit-desc-${id}`).value;
            
            try {
                const { error } = await supabase.from('features')
                    .update({ title, description: desc })
                    .eq('id', id);
                if (error) throw error;
                
                editingId = null;
                await loadFeatures();
                render();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        };

        window.cancelEdit = () => {
            editingId = null;
            render();
        };

        window.deleteFeature = async (id) => {
            if (!confirm('Delete?')) return;
            try {
                const { error } = await supabase.from('features').delete().eq('id', id);
                if (error) throw error;
                await loadFeatures();
                render();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        };

        window.moveFeature = async (id, col) => {
            try {
                const { error } = await supabase.from('features')
                    .update({ column_name: col })
                    .eq('id', id);
                if (error) throw error;
                await loadFeatures();
                render();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        };

        function showError(msg) {
            const app = document.getElementById('app');
            app.innerHTML = `<div class="p-8 text-red-400">${msg}</div>`;
        }

        function render() {
            const app = document.getElementById('app');
            if (!app) return;
            
            if (!currentUser) {
                app.innerHTML = renderAuth();
            } else {
                app.innerHTML = renderBoard();
            }
        }

        function renderAuth() {
            return `
                <div class="min-h-screen flex items-center justify-center px-4">
                    <div class="w-full max-w-md">
                        <div class="text-center mb-8">
                            <div style="font-size: 28px; font-weight: bold;">
                                <span style="color: white;">gumtree</span><span class="gumtree-green">.</span><span style="color: white;">co.</span><span class="gumtree-green">za</span>
                            </div>
                            <p class="text-gray-400 text-sm mt-2">MVP Feature Board</p>
                        </div>
                        
                        <div class="bg-slate-800/50 border border-blue-500/20 rounded-xl p-8">
                            <h2 class="text-2xl font-bold text-white mb-6">${isSignup ? 'Sign Up' : 'Login'}</h2>
                            
                            <form onsubmit="${isSignup ? 'handleSignUp' : 'handleLogin'}(event)" class="space-y-4">
                                ${isSignup ? `<input type="text" id="auth-name" placeholder="Name" class="w-full bg-slate-700/50 border border-slate-600 text-white px-4 py-2 rounded-lg" required/>` : ''}
                                <input type="email" id="auth-email" placeholder="Email" class="w-full bg-slate-700/50 border border-slate-600 text-white px-4 py-2 rounded-lg" required/>
                                <input type="password" id="auth-password" placeholder="Password" class="w-full bg-slate-700/50 border border-slate-600 text-white px-4 py-2 rounded-lg" required/>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-semibold">${isSignup ? 'Sign Up' : 'Login'}</button>
                            </form>
                            
                            <button onclick="toggleAuthMode()" class="w-full text-blue-400 text-sm mt-4">${isSignup ? 'Have account? Login' : 'No account? Sign Up'}</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderBoard() {
            return `
                <div>
                    <header class="bg-gradient-to-r from-blue-900 to-slate-900 border-b border-blue-500/20 sticky top-0 z-50">
                        <div class="px-4 py-3 flex justify-between items-center">
                            <div style="font-size: 20px; font-weight: bold;">
                                <span style="color: white;">gumtree</span><span class="gumtree-green">.</span><span style="color: white;">co.</span><span class="gumtree-green">za</span>
                            </div>
                            <div class="flex items-center gap-4">
                                <p class="text-gray-300 text-sm">${currentUser.email}</p>
                                <button onclick="handleLogout()" class="bg-red-600/30 hover:bg-red-600/50 text-red-300 text-xs px-3 py-1.5 rounded">Logout</button>
                            </div>
                        </div>
                    </header>
                    
                    <main class="px-4 py-6">
                        <div class="mb-6 bg-slate-800/50 border border-blue-500/20 rounded-xl p-4">
                            <h2 class="text-white font-bold mb-3">➕ Add Feature</h2>
                            <form onsubmit="addFeature(event)" class="space-y-2">
                                <input type="text" id="title" placeholder="Title" class="w-full bg-slate-700/50 border border-slate-600 text-white px-3 py-2 rounded-lg text-sm" required/>
                                <textarea id="desc" placeholder="Description" class="w-full bg-slate-700/50 border border-slate-600 text-white px-3 py-2 rounded-lg text-sm" rows="2"></textarea>
                                <div class="grid grid-cols-3 gap-2">
                                    <select id="cat" class="bg-slate-700/50 border border-slate-600 text-white px-3 py-2 rounded-lg text-sm">
                                        ${Object.entries(CATEGORIES).map(([k,v]) => `<option value="${k}">${v.icon} ${v.label}</option>`).join('')}
                                    </select>
                                    <select id="col" class="bg-slate-700/50 border border-slate-600 text-white px-3 py-2 rounded-lg text-sm">
                                        <option value="mvp">MVP</option>
                                        <option value="v1.1">V1.1</option>
                                        <option value="v2">V2</option>
                                        <option value="backburner">Backburner</option>
                                    </select>
                                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-semibold">Add</button>
                                </div>
                            </form>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            ${['mvp', 'v1.1', 'v2', 'backburner'].map(col => `
                                <div class="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden">
                                    <div class="bg-slate-700/50 px-4 py-3">
                                        <h3 class="text-white font-bold">${col === 'mvp' ? '🔴 MVP' : col === 'v1.1' ? '🟡 V1.1' : col === 'v2' ? '🟢 V2' : '⚫ Backburner'}</h3>
                                        <p class="text-gray-400 text-xs mt-1">${features.filter(f => f.column_name === col).length} items</p>
                                    </div>
                                    <div class="p-4 space-y-2 max-h-96 overflow-y-auto">
                                        ${features.filter(f => f.column_name === col).map(f => `
                                            <div class="bg-slate-700/50 border border-slate-600 rounded-lg p-3 text-white text-sm group">
                                                ${editingId === f.id ? `
                                                    <div class="space-y-2">
                                                        <input type="text" id="edit-title-${f.id}" value="${f.title}" class="w-full bg-slate-600 border border-slate-500 text-white px-2 py-1 rounded text-xs" />
                                                        <textarea id="edit-desc-${f.id}" class="w-full bg-slate-600 border border-slate-500 text-white px-2 py-1 rounded text-xs" rows="2">${f.description || ''}</textarea>
                                                        <div class="flex gap-1">
                                                            <button onclick="saveEdit('${f.id}')" class="flex-1 bg-blue-600 hover:bg-blue-700 px-2 py-1 rounded text-xs">Save</button>
                                                            <button onclick="cancelEdit()" class="flex-1 bg-gray-600 hover:bg-gray-700 px-2 py-1 rounded text-xs">Cancel</button>
                                                        </div>
                                                    </div>
                                                ` : `
                                                    <p class="font-bold">${f.title}</p>
                                                    ${f.description ? `<p class="text-xs text-gray-300">${f.description}</p>` : ''}
                                                    <p class="text-xs text-blue-300 mt-1">${CATEGORIES[f.category]?.icon} ${CATEGORIES[f.category]?.label}</p>
                                                    <div class="flex gap-1 mt-2 opacity-0 group-hover:opacity-100">
                                                        <button onclick="editFeature('${f.id}')" class="text-xs bg-blue-600/30 text-blue-300 px-2 py-1 rounded">Edit</button>
                                                        <button onclick="deleteFeature('${f.id}')" class="text-xs bg-red-600/30 text-red-300 px-2 py-1 rounded">Delete</button>
                                                        ${col !== 'mvp' ? `<button onclick="moveFeature('${f.id}', 'mvp')" class="text-xs bg-purple-600/30 text-purple-300 px-2 py-1 rounded">MVP</button>` : ''}
                                                    </div>
                                                `}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </main>
                </div>
            `;
        }

        // Start
        window.addEventListener('load', init);
    </script>
</body>
</html>
